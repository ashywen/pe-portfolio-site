<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta property="og:title" content="Personal Portfolio">
    <meta property="og:description" content="My Personal Portfolio">
    <meta property="og:url" content="{{ url }}">

    <link rel="icon" href="{{ url_for('static', filename='img/default/favicon.ico') }}" type="image/x-icon" />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">
    <title>{{ title }}</title>
</head>

<body>
    <header class="site-header">
        <div class="nav-content">
            <a class="brand" href="{{ url_for('home') }}">
                <img src="{{ url_for('static', filename='img/default/logo.svg') }}" alt="Logo">
            </a>
            <nav class="top-nav">
                {% for page in pages %}
                    <a class="nav-link" href="{{ url_for(page.endpoint) }}">{{ page.name }}</a>
                {% endfor %}
            </nav>
        </div>
    </header>

    <main class="page-shell">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
